[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/pix/charge"
  to = "/.netlify/functions/pix-charge"
  status = 200

[[redirects]]
  from = "/api/order/*"
  to = "/.netlify/functions/order/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
